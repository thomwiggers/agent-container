services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agents
      args:
        INSTALL_GEMINI: "false"
        INSTALL_GO: "false"
        GO_VERSION: "1.24"
        INSTALL_RUST: "false"
    # Keep container alive; devcontainer CLI attaches to this service
    command: sleep infinity
    volumes:
      - ${COMPOSE_WORKSPACE_ROOT:-.}:/workspace

  github-mcp:
    build:
      context: .
      dockerfile: Dockerfile.github-mcp
    environment:
      # Export GITHUB_PERSONAL_ACCESS_TOKEN in your shell before opening VS Code.
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    expose:
      - "8765"
    restart: unless-stopped
